<!DOCTYPE html>
<html>
<head>
    <title>Image Viewer</title>
    <style>
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .item { border: 1px solid #ccc; padding: 10px; text-align: center; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="item"><h3>unnamed.png</h3><img src="unnamed.png"></div>
        <div class="item"><h3>unnamed (1).png</h3><img src="unnamed (1).png"></div>
        <div class="item"><h3>unnamed (2).png</h3><img src="unnamed (2).png"></div>
        <div class="item"><h3>unnamed (3).png</h3><img src="unnamed (3).png"></div>
        <div class="item"><h3>unnamed (4).png</h3><img src="unnamed (4).png"></div>
        <div class="item"><h3>unnamed (5).png</h3><img src="unnamed (5).png"></div>
        <div class="item"><h3>unnamed (6).png</h3><img src="unnamed (6).png"></div>
        <div class="item"><h3>unnamed (7).png</h3><img src="unnamed (7).png"></div>
        <div class="item"><h3>unnamed (8).png</h3><img src="unnamed (8).png"></div>
        <div class="item"><h3>unnamed (9).png</h3><img src="unnamed (9).png"></div>
        <div class="item"><h3>unnamed (10).png</h3><img src="unnamed (10).png"></div>
        <div class="item"><h3>unnamed (11).png</h3><img src="unnamed (11).png"></div>
        <div class="item"><h3>unnamed (12).png</h3><img src="unnamed (12).png"></div>
        <div class="item"><h3>unnamed (13).png</h3><img src="unnamed (13).png"></div>
        <div class="item"><h3>unnamed (14).png</h3><img src="unnamed (14).png"></div>
    </div>
</body>
</html>
